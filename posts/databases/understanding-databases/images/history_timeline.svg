<svg viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="tbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0f6ff"/>
      <stop offset="100%" style="stop-color:#e8f4f8"/>
    </linearGradient>
  </defs>
  <rect width="860" height="220" fill="url(#tbg)" rx="12"/>
  <rect x="0" y="0" width="860" height="5" rx="2" fill="#2e75b6"/>

  <!-- Timeline spine -->
  <line x1="60" y1="110" x2="820" y2="110" stroke="#2e75b6" stroke-width="3"/>
  <polygon points="820,105 835,110 820,115" fill="#2e75b6"/>

  <!-- Era 1: File Systems -->
  <circle cx="100" cy="110" r="12" fill="#2e75b6"/>
  <rect x="65" y="45" width="100" height="48" rx="6" fill="#2e75b6"/>
  <text x="115" y="63" text-anchor="middle" fill="white" font-size="10" font-weight="bold">1950s–60s</text>
  <text x="115" y="77" text-anchor="middle" fill="white" font-size="9">File System</text>
  <text x="115" y="89" text-anchor="middle" fill="white" font-size="9">Era</text>
  <line x1="100" y1="93" x2="100" y2="98" stroke="#2e75b6" stroke-width="2"/>

  <!-- Era 2: Hierarchical -->
  <circle cx="240" cy="110" r="12" fill="#1a6e3c"/>
  <rect x="195" y="130" width="110" height="48" rx="6" fill="#1a6e3c"/>
  <text x="250" y="148" text-anchor="middle" fill="white" font-size="10" font-weight="bold">1960s–70s</text>
  <text x="250" y="162" text-anchor="middle" fill="white" font-size="9">Hierarchical &amp;</text>
  <text x="250" y="174" text-anchor="middle" fill="white" font-size="9">Network DBs</text>
  <line x1="240" y1="122" x2="240" y2="130" stroke="#1a6e3c" stroke-width="2"/>

  <!-- Era 3: Relational -->
  <circle cx="400" cy="110" r="12" fill="#a85a0f"/>
  <rect x="348" y="45" width="110" height="48" rx="6" fill="#a85a0f"/>
  <text x="403" y="63" text-anchor="middle" fill="white" font-size="10" font-weight="bold">1970s–80s</text>
  <text x="403" y="77" text-anchor="middle" fill="white" font-size="9">Relational</text>
  <text x="403" y="89" text-anchor="middle" fill="white" font-size="9">Revolution</text>
  <line x1="400" y1="93" x2="400" y2="98" stroke="#a85a0f" stroke-width="2"/>

  <!-- Era 4: Internet/NoSQL -->
  <circle cx="570" cy="110" r="12" fill="#8e44ad"/>
  <rect x="515" y="130" width="120" height="48" rx="6" fill="#8e44ad"/>
  <text x="575" y="148" text-anchor="middle" fill="white" font-size="10" font-weight="bold">1990s–2010s</text>
  <text x="575" y="162" text-anchor="middle" fill="white" font-size="9">Internet &amp;</text>
  <text x="575" y="174" text-anchor="middle" fill="white" font-size="9">NoSQL Movement</text>
  <line x1="570" y1="122" x2="570" y2="130" stroke="#8e44ad" stroke-width="2"/>

  <!-- Era 5: Cloud -->
  <circle cx="750" cy="110" r="12" fill="#e74c3c"/>
  <rect x="695" y="45" width="115" height="48" rx="6" fill="#e74c3c"/>
  <text x="752" y="63" text-anchor="middle" fill="white" font-size="10" font-weight="bold">2010s–Now</text>
  <text x="752" y="77" text-anchor="middle" fill="white" font-size="9">Cloud &amp;</text>
  <text x="752" y="89" text-anchor="middle" fill="white" font-size="9">Serverless Era</text>
  <line x1="750" y1="93" x2="750" y2="98" stroke="#e74c3c" stroke-width="2"/>

  <text x="430" y="208" text-anchor="middle" fill="#666" font-size="11" font-style="italic">Evolution of Database Technology</text>
</svg>
