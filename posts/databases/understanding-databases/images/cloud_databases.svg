<svg viewBox="0 0 820 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="cloudbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a"/>
      <stop offset="100%" style="stop-color:#0d1b2e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="820" height="300" fill="url(#cloudbg)" rx="12"/>

  <!-- Stars/dots background -->
  <g fill="white" opacity="0.15">
    <circle cx="50" cy="40" r="1.5"/><circle cx="150" cy="20" r="1"/><circle cx="250" cy="55" r="1.5"/>
    <circle cx="400" cy="25" r="1"/><circle cx="550" cy="45" r="1.5"/><circle cx="700" cy="15" r="1"/>
    <circle cx="780" cy="60" r="1.5"/><circle cx="80" cy="280" r="1"/><circle cx="200" cy="270" r="1.5"/>
    <circle cx="350" cy="285" r="1"/><circle cx="600" cy="275" r="1.5"/><circle cx="750" cy="280" r="1"/>
  </g>

  <!-- Title -->
  <text x="410" y="35" text-anchor="middle" fill="white" font-size="16" font-weight="bold">Cloud Database Services</text>
  <text x="410" y="53" text-anchor="middle" fill="#8ab4d4" font-size="11">Managed databases across the three major cloud providers</text>

  <!-- AWS Column -->
  <rect x="30" y="70" width="235" height="205" rx="10" fill="white" fill-opacity="0.06" stroke="#ff9900" stroke-width="1.5"/>
  <rect x="30" y="70" width="235" height="36" rx="10" fill="#ff9900" fill-opacity="0.8"/>
  <rect x="30" y="94" width="235" height="12" fill="#ff9900" fill-opacity="0.8"/>
  <text x="147" y="93" text-anchor="middle" fill="white" font-size="13" font-weight="bold">☁ Amazon Web Services</text>
  <!-- AWS services -->
  <rect x="42" y="118" width="211" height="26" rx="5" fill="#ff9900" fill-opacity="0.2"/>
  <text x="55" y="135" fill="#ffcc66" font-size="11" font-weight="bold">RDS</text>
  <text x="95" y="135" fill="#ccc" font-size="10">MySQL, Postgres, Oracle…</text>
  <rect x="42" y="150" width="211" height="26" rx="5" fill="#ff9900" fill-opacity="0.15"/>
  <text x="55" y="167" fill="#ffcc66" font-size="11" font-weight="bold">Aurora</text>
  <text x="108" y="167" fill="#ccc" font-size="10">High-perf relational</text>
  <rect x="42" y="182" width="211" height="26" rx="5" fill="#ff9900" fill-opacity="0.2"/>
  <text x="55" y="199" fill="#ffcc66" font-size="11" font-weight="bold">DynamoDB</text>
  <text x="130" y="199" fill="#ccc" font-size="10">Key-value / doc</text>
  <rect x="42" y="214" width="211" height="26" rx="5" fill="#ff9900" fill-opacity="0.15"/>
  <text x="55" y="231" fill="#ffcc66" font-size="11" font-weight="bold">Redshift</text>
  <text x="113" y="231" fill="#ccc" font-size="10">Data warehouse</text>
  <rect x="42" y="246" width="211" height="22" rx="5" fill="#ff9900" fill-opacity="0.1"/>
  <text x="55" y="261" fill="#ffcc66" font-size="10" font-weight="bold">ElastiCache</text>
  <text x="126" y="261" fill="#ccc" font-size="10">Redis / Memcached</text>

  <!-- Azure Column -->
  <rect x="292" y="70" width="235" height="205" rx="10" fill="white" fill-opacity="0.06" stroke="#0078d4" stroke-width="1.5"/>
  <rect x="292" y="70" width="235" height="36" rx="10" fill="#0078d4" fill-opacity="0.8"/>
  <rect x="292" y="94" width="235" height="12" fill="#0078d4" fill-opacity="0.8"/>
  <text x="409" y="93" text-anchor="middle" fill="white" font-size="13" font-weight="bold">☁ Microsoft Azure</text>
  <rect x="304" y="118" width="211" height="26" rx="5" fill="#0078d4" fill-opacity="0.2"/>
  <text x="317" y="135" fill="#66b3ff" font-size="11" font-weight="bold">Azure SQL DB</text>
  <text x="415" y="135" fill="#ccc" font-size="10">Managed SQL Server</text>
  <rect x="304" y="150" width="211" height="26" rx="5" fill="#0078d4" fill-opacity="0.15"/>
  <text x="317" y="167" fill="#66b3ff" font-size="11" font-weight="bold">Cosmos DB</text>
  <text x="405" y="167" fill="#ccc" font-size="10">Multi-model NoSQL</text>
  <rect x="304" y="182" width="211" height="26" rx="5" fill="#0078d4" fill-opacity="0.2"/>
  <text x="317" y="199" fill="#66b3ff" font-size="11" font-weight="bold">Synapse Analytics</text>
  <text x="437" y="199" fill="#ccc" font-size="10">Data warehouse</text>
  <rect x="304" y="214" width="211" height="26" rx="5" fill="#0078d4" fill-opacity="0.15"/>
  <text x="317" y="231" fill="#66b3ff" font-size="11" font-weight="bold">DB for PostgreSQL</text>
  <text x="440" y="231" fill="#ccc" font-size="10">Managed Postgres</text>
  <rect x="304" y="246" width="211" height="22" rx="5" fill="#0078d4" fill-opacity="0.1"/>
  <text x="317" y="261" fill="#66b3ff" font-size="10" font-weight="bold">Cache for Redis</text>
  <text x="410" y="261" fill="#ccc" font-size="10">Managed Redis</text>

  <!-- GCP Column -->
  <rect x="554" y="70" width="235" height="205" rx="10" fill="white" fill-opacity="0.06" stroke="#34a853" stroke-width="1.5"/>
  <rect x="554" y="70" width="235" height="36" rx="10" fill="#34a853" fill-opacity="0.8"/>
  <rect x="554" y="94" width="235" height="12" fill="#34a853" fill-opacity="0.8"/>
  <text x="671" y="93" text-anchor="middle" fill="white" font-size="13" font-weight="bold">☁ Google Cloud</text>
  <rect x="566" y="118" width="211" height="26" rx="5" fill="#34a853" fill-opacity="0.2"/>
  <text x="579" y="135" fill="#80d4a0" font-size="11" font-weight="bold">Cloud Spanner</text>
  <text x="670" y="135" fill="#ccc" font-size="10">Global relational</text>
  <rect x="566" y="150" width="211" height="26" rx="5" fill="#34a853" fill-opacity="0.15"/>
  <text x="579" y="167" fill="#80d4a0" font-size="11" font-weight="bold">Firestore</text>
  <text x="636" y="167" fill="#ccc" font-size="10">Managed document DB</text>
  <rect x="566" y="182" width="211" height="26" rx="5" fill="#34a853" fill-opacity="0.2"/>
  <text x="579" y="199" fill="#80d4a0" font-size="11" font-weight="bold">BigQuery</text>
  <text x="637" y="199" fill="#ccc" font-size="10">Serverless data warehouse</text>
  <rect x="566" y="214" width="211" height="26" rx="5" fill="#34a853" fill-opacity="0.15"/>
  <text x="579" y="231" fill="#80d4a0" font-size="11" font-weight="bold">Cloud SQL</text>
  <text x="646" y="231" fill="#ccc" font-size="10">MySQL / Postgres</text>
  <rect x="566" y="246" width="211" height="22" rx="5" fill="#34a853" fill-opacity="0.1"/>
  <text x="579" y="261" fill="#80d4a0" font-size="10" font-weight="bold">Bigtable</text>
  <text x="630" y="261" fill="#ccc" font-size="10">Wide-column / NoSQL</text>
</svg>
