<svg viewBox="0 0 820 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="280" fill="#f8fbff" rx="12"/>
  <rect x="0" y="0" width="820" height="5" rx="2" fill="#8e44ad"/>

  <!-- Title -->
  <text x="410" y="32" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="bold">Four Major NoSQL Database Types</text>

  <!-- Document DB -->
  <rect x="20" y="50" width="185" height="200" rx="10" fill="white" stroke="#27ae60" stroke-width="2"/>
  <rect x="20" y="50" width="185" height="38" rx="10" fill="#27ae60"/>
  <rect x="20" y="75" width="185" height="13" fill="#27ae60"/>
  <text x="112" y="74" text-anchor="middle" fill="white" font-size="12" font-weight="bold">📄 Document</text>
  <text x="35" y="108" fill="#333" font-size="10" font-weight="bold">Example: MongoDB</text>
  <rect x="30" y="115" width="165" height="120" rx="6" fill="#f0faf4"/>
  <text x="40" y="131" fill="#27ae60" font-size="9">{</text>
  <text x="48" y="144" fill="#27ae60" font-size="9">  "id": "u1",</text>
  <text x="48" y="157" fill="#27ae60" font-size="9">  "name": "Alice",</text>
  <text x="48" y="170" fill="#27ae60" font-size="9">  "orders": [</text>
  <text x="56" y="183" fill="#27ae60" font-size="9">    {amt: 49.99}</text>
  <text x="48" y="196" fill="#27ae60" font-size="9">  ],</text>
  <text x="48" y="209" fill="#27ae60" font-size="9">  "vip": true</text>
  <text x="40" y="222" fill="#27ae60" font-size="9">}</text>
  <text x="112" y="245" text-anchor="middle" fill="#555" font-size="9">Flexible JSON docs</text>

  <!-- Key-Value DB -->
  <rect x="220" y="50" width="185" height="200" rx="10" fill="white" stroke="#e74c3c" stroke-width="2"/>
  <rect x="220" y="50" width="185" height="38" rx="10" fill="#e74c3c"/>
  <rect x="220" y="75" width="185" height="13" fill="#e74c3c"/>
  <text x="312" y="74" text-anchor="middle" fill="white" font-size="12" font-weight="bold">🔑 Key-Value</text>
  <text x="235" y="108" fill="#333" font-size="10" font-weight="bold">Example: Redis</text>
  <rect x="230" y="115" width="165" height="120" rx="6" fill="#fff5f5"/>
  <text x="240" y="135" fill="#e74c3c" font-size="9" font-weight="bold">KEY</text>
  <text x="360" y="135" fill="#e74c3c" font-size="9" font-weight="bold">VALUE</text>
  <line x1="230" y1="140" x2="395" y2="140" stroke="#e74c3c" stroke-width="1" opacity="0.3"/>
  <text x="240" y="154" fill="#555" font-size="9">session:abc</text>
  <text x="338" y="154" fill="#555" font-size="9">user_data</text>
  <line x1="230" y1="160" x2="395" y2="160" stroke="#ddd" stroke-width="1"/>
  <text x="240" y="174" fill="#555" font-size="9">cache:home</text>
  <text x="338" y="174" fill="#555" font-size="9">html_string</text>
  <line x1="230" y1="180" x2="395" y2="180" stroke="#ddd" stroke-width="1"/>
  <text x="240" y="194" fill="#555" font-size="9">rate:user1</text>
  <text x="338" y="194" fill="#555" font-size="9">42</text>
  <line x1="230" y1="200" x2="395" y2="200" stroke="#ddd" stroke-width="1"/>
  <text x="240" y="214" fill="#555" font-size="9">lock:order99</text>
  <text x="338" y="214" fill="#555" font-size="9">true</text>
  <text x="312" y="245" text-anchor="middle" fill="#555" font-size="9">Ultra-fast lookups</text>

  <!-- Column-Family DB -->
  <rect x="420" y="50" width="185" height="200" rx="10" fill="white" stroke="#2e75b6" stroke-width="2"/>
  <rect x="420" y="50" width="185" height="38" rx="10" fill="#2e75b6"/>
  <rect x="420" y="75" width="185" height="13" fill="#2e75b6"/>
  <text x="512" y="74" text-anchor="middle" fill="white" font-size="12" font-weight="bold">📊 Column-Family</text>
  <text x="435" y="108" fill="#333" font-size="10" font-weight="bold">Example: Cassandra</text>
  <rect x="430" y="115" width="165" height="120" rx="6" fill="#f0f6ff"/>
  <!-- Mini table visual -->
  <rect x="435" y="120" width="50" height="16" fill="#2e75b6"/>
  <rect x="490" y="120" width="50" height="16" fill="#2e75b6"/>
  <rect x="545" y="120" width="44" height="16" fill="#2e75b6"/>
  <text x="460" y="132" text-anchor="middle" fill="white" font-size="8">row_key</text>
  <text x="515" y="132" text-anchor="middle" fill="white" font-size="8">col_fam_A</text>
  <text x="566" y="132" text-anchor="middle" fill="white" font-size="8">col_fam_B</text>
  <rect x="435" y="136" width="50" height="14" fill="#e8f0fc"/><text x="460" y="147" text-anchor="middle" fill="#333" font-size="8">user:1</text>
  <rect x="490" y="136" width="50" height="14" fill="#f5f8ff"/><text x="515" y="147" text-anchor="middle" fill="#333" font-size="8">name,age</text>
  <rect x="545" y="136" width="44" height="14" fill="#e8f0fc"/><text x="566" y="147" text-anchor="middle" fill="#333" font-size="8">city</text>
  <rect x="435" y="150" width="50" height="14" fill="#f5f8ff"/><text x="460" y="161" text-anchor="middle" fill="#333" font-size="8">user:2</text>
  <rect x="490" y="150" width="50" height="14" fill="#e8f0fc"/><text x="515" y="161" text-anchor="middle" fill="#333" font-size="8">name</text>
  <rect x="545" y="150" width="44" height="14" fill="#f5f8ff"/><text x="566" y="161" text-anchor="middle" fill="#333" font-size="8">city,zip</text>
  <text x="512" y="200" text-anchor="middle" fill="#888" font-size="9">Sparse, flexible columns</text>
  <text x="512" y="245" text-anchor="middle" fill="#555" font-size="9">Massive write throughput</text>

  <!-- Graph DB -->
  <rect x="620" y="50" width="180" height="200" rx="10" fill="white" stroke="#f39c12" stroke-width="2"/>
  <rect x="620" y="50" width="180" height="38" rx="10" fill="#f39c12"/>
  <rect x="620" y="75" width="180" height="13" fill="#f39c12"/>
  <text x="710" y="74" text-anchor="middle" fill="white" font-size="12" font-weight="bold">🕸 Graph</text>
  <text x="635" y="108" fill="#333" font-size="10" font-weight="bold">Example: Neo4j</text>
  <!-- Graph nodes -->
  <circle cx="695" cy="160" r="22" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="2"/>
  <text x="695" y="164" text-anchor="middle" fill="#c87500" font-size="9" font-weight="bold">Alice</text>
  <circle cx="750" cy="130" r="18" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="2"/>
  <text x="750" y="134" text-anchor="middle" fill="#c87500" font-size="9">Bob</text>
  <circle cx="755" cy="195" r="18" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="2"/>
  <text x="755" y="199" text-anchor="middle" fill="#c87500" font-size="9">Carol</text>
  <circle cx="648" cy="130" r="18" fill="#f39c12" opacity="0.15" stroke="#f39c12" stroke-width="2"/>
  <text x="648" y="134" text-anchor="middle" fill="#c87500" font-size="9">Dave</text>
  <line x1="673" y1="150" x2="736" y2="136" stroke="#f39c12" stroke-width="1.5"/>
  <text x="704" y="138" fill="#999" font-size="7">FRIENDS</text>
  <line x1="695" y1="182" x2="746" y2="184" stroke="#f39c12" stroke-width="1.5"/>
  <text x="716" y="178" fill="#999" font-size="7">FOLLOWS</text>
  <line x1="673" y1="152" x2="660" y2="144" stroke="#f39c12" stroke-width="1.5"/>
  <text x="655" y="153" fill="#999" font-size="7">KNOWS</text>
  <text x="710" y="245" text-anchor="middle" fill="#555" font-size="9">Relationship traversal</text>
</svg>
