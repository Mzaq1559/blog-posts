<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
    <linearGradient id="cyl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2e75b6"/>
      <stop offset="100%" style="stop-color:#1a4a7a"/>
    </linearGradient>
    <linearGradient id="cyl2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60"/>
      <stop offset="100%" style="stop-color:#1a6e3c"/>
    </linearGradient>
    <linearGradient id="cyl3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e67e22"/>
      <stop offset="100%" style="stop-color:#a85a0f"/>
    </linearGradient>
    <linearGradient id="cyl4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8e44ad"/>
      <stop offset="100%" style="stop-color:#5c2d6e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.08" stroke="#4a9ede" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/><line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/><line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="250" x2="900" y2="250"/><line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="350" x2="900" y2="350"/><line x1="0" y1="400" x2="900" y2="400"/>
    <line x1="0" y1="450" x2="900" y2="450"/>
    <line x1="100" y1="0" x2="100" y2="500"/><line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/><line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/><line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/><line x1="800" y1="0" x2="800" y2="500"/>
  </g>

  <!-- Database cylinders - left cluster -->
  <!-- Cylinder 1 (SQL - blue) -->
  <ellipse cx="140" cy="305" rx="45" ry="12" fill="#1a4a7a"/>
  <rect x="95" y="245" width="90" height="60" fill="url(#cyl)"/>
  <ellipse cx="140" cy="245" rx="45" ry="12" fill="#4a9ede"/>
  <ellipse cx="140" cy="258" rx="45" ry="12" fill="#3a8ace" opacity="0.6"/>
  <ellipse cx="140" cy="271" rx="45" ry="12" fill="#3a8ace" opacity="0.4"/>
  <text x="140" y="282" text-anchor="middle" fill="white" font-size="11" font-weight="bold">SQL</text>

  <!-- Cylinder 2 (NoSQL - green) -->
  <ellipse cx="240" cy="330" rx="45" ry="12" fill="#1a6e3c"/>
  <rect x="195" y="265" width="90" height="65" fill="url(#cyl2)"/>
  <ellipse cx="240" cy="265" rx="45" ry="12" fill="#2ecc71"/>
  <ellipse cx="240" cy="278" rx="45" ry="12" fill="#27ae60" opacity="0.6"/>
  <ellipse cx="240" cy="291" rx="45" ry="12" fill="#27ae60" opacity="0.4"/>
  <text x="240" y="305" text-anchor="middle" fill="white" font-size="11" font-weight="bold">NoSQL</text>

  <!-- Cylinder 3 (Graph - orange) -->
  <ellipse cx="340" cy="315" rx="45" ry="12" fill="#a85a0f"/>
  <rect x="295" y="255" width="90" height="60" fill="url(#cyl3)"/>
  <ellipse cx="340" cy="255" rx="45" ry="12" fill="#f39c12"/>
  <ellipse cx="340" cy="268" rx="45" ry="12" fill="#e67e22" opacity="0.6"/>
  <ellipse cx="340" cy="281" rx="45" ry="12" fill="#e67e22" opacity="0.4"/>
  <text x="340" y="292" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Graph</text>

  <!-- Cylinder 4 (Cloud - purple) -->
  <ellipse cx="440" cy="340" rx="45" ry="12" fill="#5c2d6e"/>
  <rect x="395" y="270" width="90" height="70" fill="url(#cyl4)"/>
  <ellipse cx="440" cy="270" rx="45" ry="12" fill="#9b59b6"/>
  <ellipse cx="440" cy="283" rx="45" ry="12" fill="#8e44ad" opacity="0.6"/>
  <ellipse cx="440" cy="296" rx="45" ry="12" fill="#8e44ad" opacity="0.4"/>
  <text x="440" y="310" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Cloud</text>

  <!-- Connection lines between cylinders -->
  <g stroke="#4a9ede" stroke-width="1.5" opacity="0.5" fill="none">
    <line x1="185" y1="270" x2="195" y2="278"/>
    <line x1="285" y1="278" x2="295" y2="270"/>
    <line x1="385" y1="275" x2="395" y2="285"/>
  </g>

  <!-- Floating data nodes - right side -->
  <g filter="url(#glow)">
    <circle cx="620" cy="160" r="8" fill="#4a9ede" opacity="0.9"/>
    <circle cx="680" cy="200" r="6" fill="#2ecc71" opacity="0.9"/>
    <circle cx="720" cy="140" r="10" fill="#f39c12" opacity="0.9"/>
    <circle cx="760" cy="190" r="7" fill="#9b59b6" opacity="0.9"/>
    <circle cx="650" cy="240" r="9" fill="#e74c3c" opacity="0.9"/>
    <circle cx="800" cy="160" r="6" fill="#1abc9c" opacity="0.9"/>
    <circle cx="840" cy="220" r="8" fill="#4a9ede" opacity="0.9"/>
    <circle cx="700" cy="280" r="5" fill="#2ecc71" opacity="0.9"/>
    <circle cx="780" cy="270" r="7" fill="#f39c12" opacity="0.9"/>
  </g>
  <!-- Node connections -->
  <g stroke="#4a9ede" stroke-width="1" opacity="0.3">
    <line x1="620" y1="160" x2="680" y2="200"/>
    <line x1="680" y1="200" x2="720" y2="140"/>
    <line x1="720" y1="140" x2="760" y2="190"/>
    <line x1="760" y1="190" x2="800" y2="160"/>
    <line x1="680" y1="200" x2="650" y2="240"/>
    <line x1="760" y1="190" x2="840" y2="220"/>
    <line x1="650" y1="240" x2="700" y2="280"/>
    <line x1="840" y1="220" x2="780" y2="270"/>
    <line x1="700" y1="280" x2="780" y2="270"/>
    <line x1="800" y1="160" x2="840" y2="220"/>
  </g>

  <!-- Title text -->
  <text x="450" y="90" text-anchor="middle" fill="white" font-size="52" font-weight="bold" opacity="0.95" letter-spacing="2">Understanding</text>
  <text x="450" y="148" text-anchor="middle" fill="#4a9ede" font-size="52" font-weight="bold" letter-spacing="2">Databases</text>
  <text x="450" y="190" text-anchor="middle" fill="#aac8e8" font-size="18" letter-spacing="1">A Comprehensive Guide to the World of Data Storage</text>

  <!-- Divider line -->
  <line x1="200" y1="210" x2="700" y2="210" stroke="#4a9ede" stroke-width="1.5" opacity="0.5"/>

  <!-- Subtitle tags -->
  <rect x="230" y="220" width="90" height="22" rx="11" fill="#2e75b6" opacity="0.7"/>
  <text x="275" y="235" text-anchor="middle" fill="white" font-size="11">SQL</text>
  <rect x="332" y="220" width="90" height="22" rx="11" fill="#27ae60" opacity="0.7"/>
  <text x="377" y="235" text-anchor="middle" fill="white" font-size="11">NoSQL</text>
  <rect x="434" y="220" width="90" height="22" rx="11" fill="#e67e22" opacity="0.7"/>
  <text x="479" y="235" text-anchor="middle" fill="white" font-size="11">Cloud</text>
  <rect x="536" y="220" width="90" height="22" rx="11" fill="#8e44ad" opacity="0.7"/>
  <text x="581" y="235" text-anchor="middle" fill="white" font-size="11">Analytics</text>

  <!-- Bottom bar -->
  <rect x="0" y="460" width="900" height="40" fill="#0a1520" opacity="0.7"/>
  <text x="450" y="485" text-anchor="middle" fill="#4a9ede" font-size="13" letter-spacing="3">TYPES · TOOLS · ARCHITECTURE · REAL-WORLD APPLICATIONS</text>
</svg>
